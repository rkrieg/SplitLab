<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl - Elevate Your Tech Experience | Premium Tech Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #ffffff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.02) 3px, transparent 3px);
            background-size: 100px 100px, 150px 150px, 200px 200px;
        }

        .hero-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 20px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            filter: brightness(0) invert(1);
        }

        .header-contact {
            color: #f5f5f5;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .header-contact:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #D4AF37;
        }

        .hero-content {
            position: relative;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            width: 100%;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: #f5f5f5;
            line-height: 1.2;
            margin-bottom: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-text p {
            font-size: 20px;
            color: #cccccc;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .cta-primary {
            background: linear-gradient(135deg, #D4AF37 0%, #F4E97A 100%);
            color: #1a1a1a;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cta-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
        }

        .hero-image {
            position: relative;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-product {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        /* Social Proof Bar */
        .social-proof-bar {
            background: #f8f8f8;
            padding: 40px 0;
            border-bottom: 1px solid #eee;
        }

        .social-proof-content {
            text-align: center;
        }

        .social-proof-content p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .trust-indicators {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .trust-stat {
            font-size: 24px;
            font-weight: 600;
            color: #D4AF37;
        }

        .trust-stat span {
            font-size: 12px;
            color: #666;
            display: block;
            font-weight: 400;
        }

        /* Featured Products */
        .featured-products {
            padding: 100px 0;
            background: #ffffff;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .section-subtitle {
            font-size: 18px;
            color: #666;
            text-align: center;
            margin-bottom: 60px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            position: relative;
            overflow: hidden;
            height: 300px;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .bestseller-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #D4AF37;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .product-info {
            padding: 30px 25px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 20px;
        }

        .add-to-cart {
            width: 100%;
            background: #1a1a1a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            background: #333;
        }

        /* Benefits Section */
        .benefits {
            padding: 100px 0;
            background: #f8f8f8;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            margin-top: 60px;
        }

        .benefit-card {
            text-align: center;
            padding: 40px 20px;
        }

        .benefit-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #D4AF37 0%, #F4E97A 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .benefit-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .benefit-description {
            font-size: 16px;
            color: #666;
        }

        /* Testimonials */
        .testimonials {
            padding: 100px 0;
            background: #fff;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 60px;
        }

        .testimonial-card {
            background: #f8f8f8;
            padding: 40px 30px;
            border-radius: 16px;
            position: relative;
        }

        .stars {
            color: #D4AF37;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .testimonial-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-info h4 {
            font-weight: 600;
            color: #1a1a1a;
        }

        .author-info span {
            font-size: 14px;
            color: #666;
        }

        /* How It Works */
        .how-it-works {
            padding: 100px 0;
            background: #1a1a1a;
            color: white;
        }

        .process-steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            margin-top: 60px;
        }

        .step-card {
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 60px;
            height: 60px;
            background: #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #1a1a1a;
            margin: 0 auto 20px;
        }

        .step-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .step-description {
            font-size: 14px;
            color: #ccc;
        }

        /* FAQ */
        .faq {
            padding: 100px 0;
            background: #f8f8f8;
        }

        .faq-list {
            max-width: 800px;
            margin: 60px auto 0;
        }

        .faq-item {
            background: white;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .faq-question {
            width: 100%;
            padding: 25px 30px;
            background: none;
            border: none;
            text-align: left;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-answer {
            padding: 0 30px 25px;
            color: #666;
            display: none;
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        /* Newsletter */
        .newsletter {
            padding: 80px 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            text-align: center;
        }

        .newsletter-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter h2 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin-bottom: 16px;
        }

        .newsletter p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #ccc;
        }

        .newsletter-form {
            display: flex;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .newsletter-input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .newsletter-input::placeholder {
            color: #ccc;
        }

        .newsletter-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #F4E97A
