<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl - Elevate Your Tech Experience with Luxury Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #2c2c2c;
            background: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 50%, #1a1a1a 100%);
            min-height: 90vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            width: 100%;
        }

        .hero-text {
            color: white;
        }

        .hero-logo {
            width: 120px;
            height: auto;
            margin-bottom: 40px;
            filter: brightness(0) invert(1);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 20px;
            margin-bottom: 32px;
            opacity: 0.9;
            font-weight: 300;
        }

        .hero-cta {
            background: linear-gradient(135deg, #d4af37 0%, #f4e06d 100%);
            color: #1a1a1a;
            padding: 18px 48px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .hero-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
        }

        .hero-image {
            position: relative;
            text-align: center;
        }

        .hero-image img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .phone-number {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #d4af37;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
        }

        /* Social Proof Bar */
        .social-proof {
            background: #f8f8f8;
            padding: 60px 0;
            text-align: center;
        }

        .social-proof h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #d4af37;
            display: block;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Featured Products */
        .featured-products {
            padding: 120px 0;
            background: white;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .section-subtitle {
            font-size: 18px;
            color: #666;
            font-weight: 300;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info {
            padding: 30px;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .product-pricing {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .current-price {
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
        }

        .original-price {
            font-size: 20px;
            color: #999;
            text-decoration: line-through;
        }

        .product-cta {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .product-cta:hover {
            background: #d4af37;
            color: #1a1a1a;
        }

        /* Benefits Section */
        .benefits {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            color: white;
            padding: 120px 0;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 60px;
        }

        .benefit-item {
            text-align: center;
        }

        .benefit-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #d4af37 0%, #f4e06d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #1a1a1a;
        }

        .benefit-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .benefit-description {
            font-size: 16px;
            opacity: 0.8;
            line-height: 1.6;
        }

        /* Testimonials */
        .testimonials {
            padding: 120px 0;
            background: #f8f8f8;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .testimonial-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .testimonial-stars {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .testimonial-text {
            font-size: 16px;
            color: #2c2c2c;
            margin-bottom: 24px;
            line-height: 1.6;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-info h4 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .author-title {
            font-size: 14px;
            color: #666;
        }

        /* Why Choose Pearl */
        .why-choose {
            padding: 120px 0;
            background: white;
        }

        .why-choose-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .why-choose-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .why-choose-text p {
            font-size: 18px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .vip-features {
            list-style: none;
            margin-bottom: 40px;
        }

        .vip-features li {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 16px;
            color: #2c2c2c;
        }

        .vip-features li:before {
            content: "✓";
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
        }

        .why-choose-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        /* Newsletter VIP */
        .newsletter-vip {
            background: linear-gradient(135deg, #d4af37 0%, #f4e06d 100%);
            padding: 100px 0;
            text-align: center;
            color: #1a1a1a;
        }

        .newsletter-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .newsletter-content p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .newsletter-form {
            display: flex;
            max-width: 500px;
            margin: 0 auto;
            gap: 16px;
        }

        .newsletter-input {
            flex: 1;
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        .newsletter-submit {
            background: #1a1a1a;
            color: white;
            padding: 18px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .newsletter-submit:hover {
            background: #2c2c2c;
            transform: translateY(-2px);
        }

        .vip-badge {
            display: inline-block;
            background: #1a1a1a;
            color: #d4af37;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* FAQ Section */
        .faq {
            padding: 120px 0;
            background: #f8f8f8;
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .faq-item {
            background: white;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .faq-question {
            padding: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            cursor: pointer;
            border: none;
            background: white;
            width: 100%;
            text-align: left;
            position: relative;
        }

        .faq-question:after {
            content: "+";
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #d4af37;
        }

        .faq-answer {
