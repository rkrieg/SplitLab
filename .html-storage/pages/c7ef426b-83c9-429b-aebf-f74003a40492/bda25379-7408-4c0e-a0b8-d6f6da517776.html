<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #2d3748;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;

        /* Urgency Bar */
        .urgency-bar {
            background: linear-gradient(90deg, #e53e3e, #ff6b35);
            color: white;
            text-align: center;
            padding: 8px 0;
            font-weight: 600;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }
        
        .urgency-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            overflow: hidden;
            white-space: nowrap;
        }
        
        .urgency-item {
            font-size: 14px;
            animation: scroll-left 20s linear infinite;
        }
        
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        /* Hero Section */

            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;

            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin-top: 40px;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            opacity: 0.1;
        }
        
        .hero-content {

            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        .hero-text h1 {
            font-size: 56px;
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        .hero-text .subheadline {
            font-size: 24px;
            margin-bottom: 30px;
            color: #fbbf24;
            font-weight: 600;
        }
        
        .countdown-timer {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;

        .countdown-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            min-width: 80px;
            backdrop-filter: blur(10px);
        }
        
        .countdown-number {
            font-size: 28px;
            font-weight: 800;
            color: #fbbf24;
        }
        
        .countdown-label {
            font-size: 12px;
            text-transform: uppercase;
        }

            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }
        
        .cta-primary:hover {
            background: #e55a2b;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 53, 0.4);
        }
        
        .cta-secondary {

            border: 2px solid white;

            font-size: 18px;
            font-weight: 600;

            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

            color: #1e3a8a;
        }

            text-align: center;

        }

        }
