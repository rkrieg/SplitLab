<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oodles Of Leads - Booking</title>
  <link rel="preconnect" href="https://images.leadconnectorhq.com">
  <link rel="preconnect" href="https://assets.cdn.filesafe.space">
  <link rel="preconnect" href="https://api.leadconnectorhq.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:100,100i,200,200i,300,300i,400,400i,500,500i,600,600i,700,700i,800,800i,900,900i&display=swap">
  <link rel="icon" href="https://storage.googleapis.com/msgsndr/2s2EIVtWKvAnA4NnYqmk/media/66f478f62104785ef7d2ba26.png">
  <style>
    :root {
      --brand-purple: #9f68e5;
      --footer-bg: #0e182c;
      --footer-copy: #8893a8;
      --form-font: Lato, Arial, Helvetica, sans-serif;
      --form-text: #101828;
      --form-muted: rgba(16, 24, 40, 0.6);
      --form-border: rgba(16, 24, 40, 0.1);
      --form-primary: #9e6be5;
      --form-primary-soft: rgba(158, 107, 229, 0.07);
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: #101828;
      background: var(--brand-purple);
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      vertical-align: middle;
      border: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      background: var(--brand-purple);
    }

    .inner {
      width: min(1170px, 100%);
      margin: 0 auto;
    }

    .logo-section {
      padding: 0;
      background: transparent;
    }

    .logo-row {
      display: flex;
      justify-content: center;
      padding: 20px 15px;
    }

    .brand-logo {
      display: block;
      width: min(400px, calc(100vw - 40px));
      height: auto;
    }

    .calendar-section {
      padding: 20px 0;
      font-family: var(--form-font);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--form-text);
      background: var(--white);
    }

    .calendar-row {
      padding: 15px;
    }

    .calendar-column {
      padding: 10px 5px;
      --appointment_widgets-primary-color: #9e6be5ff;
      --appointment_widgets-background-color: #ffffffff;
      --appointment_widgets-border-color: #1018281a;
      --appointment_widgets-light-primary-color: #9e6be512;
      --appointment_widgets-text-color: #101828;
      --appointment_widgets-light-text-color: #10182899;
      --appointment_widgets-blur-color: #ffffffb3;
    }

    .calendar-frame {
      display: block;
      width: 100%;
      min-height: 760px;
      font-family: var(--form-font);
      color: var(--form-text);
      border: 0;
      overflow: hidden;
      background: var(--white);
    }

    .footer {
      padding: 20px 0 40px;
      background: var(--footer-bg);
      color: var(--footer-copy);
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
    }

    .footer-row {
      padding: 15px;
    }

    .footer-column {
      padding: 10px 5px;
    }

    .footer p {
      margin: 0;
    }

    .footer p + p {
      margin-top: 20px;
    }

    @media (max-width: 767px) {
      .logo-row,
      .calendar-row,
      .footer-row {
        padding-left: 10px;
        padding-right: 10px;
      }

      .calendar-section {
        padding-top: 20px;
      }

      .calendar-frame {
        min-height: 920px;
      }
    }

    @media (max-width: 480px) {
      .brand-logo {
        width: min(400px, calc(100vw - 30px));
      }

      .calendar-row {
        padding-left: 0;
        padding-right: 0;
      }

      .calendar-column {
        padding-left: 0;
        padding-right: 0;
      }

      .calendar-frame {
        min-height: 980px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="logo-section" aria-label="Oodles Of Leads">
      <div class="inner">
        <div class="logo-row">
          <picture>
            <source media="(max-width: 320px)" srcset="https://images.leadconnectorhq.com/image/f_webp/q_80/r_320/u_https://assets.cdn.filesafe.space/2s2EIVtWKvAnA4NnYqmk/media/685e87e92630c54970b83d6d.png">
            <source media="(max-width: 640px)" srcset="https://images.leadconnectorhq.com/image/f_webp/q_80/r_640/u_https://assets.cdn.filesafe.space/2s2EIVtWKvAnA4NnYqmk/media/685e87e92630c54970b83d6d.png">
            <source media="(max-width: 768px)" srcset="https://images.leadconnectorhq.com/image/f_webp/q_80/r_768/u_https://assets.cdn.filesafe.space/2s2EIVtWKvAnA4NnYqmk/media/685e87e92630c54970b83d6d.png">
            <source media="(max-width: 900px)" srcset="https://images.leadconnectorhq.com/image/f_webp/q_80/r_900/u_https://assets.cdn.filesafe.space/2s2EIVtWKvAnA4NnYqmk/media/685e87e92630c54970b83d6d.png">
            <img class="brand-logo" src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/2s2EIVtWKvAnA4NnYqmk/media/685e87e92630c54970b83d6d.png" alt="Oodles Of Leads">
          </picture>
        </div>
      </div>
    </section>

    <section class="calendar-section" aria-label="Book a discovery call">
      <div class="inner">
        <div class="calendar-row">
          <div class="calendar-column">
            <iframe
              class="calendar-frame"
              id="BeNGbrJVhN63F3WwkefR"
              src="https://api.leadconnectorhq.com/widget/booking/BeNGbrJVhN63F3WwkefR"
              title="Oodles of Leads: Discovery Call (Master)"
              scrolling="no"></iframe>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="inner">
        <div class="footer-row">
          <div class="footer-column">
            <p>Copyrights 2025 |&nbsp;Oodles Marketing LLC&nbsp;|&nbsp;All rights reserved</p>
            <p><a href="https://oodlesofleads.com/privacypolicy">Privacy Policy - Refund Policy - Terms and Conditions</a></p>
          </div>
        </div>
      </div>
    </footer>
  </main>

  <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
</body>
</html>
