<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f7f4ef; font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; }
    .card { background: #fff; max-width: 580px; width: 100%; padding: 3rem; border-top: 4px solid #b8975a; box-shadow: 0 8px 40px rgba(0,0,0,.08); }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 700; color: #1a1714; margin-bottom: .3rem; }
    .sub { font-size: .85rem; color: #9a8f82; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: .35rem; }
    label { font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: #9a8f82; }
    input, select, textarea { border: 1px solid #e0d9cf; background: #faf9f7; padding: .65rem .9rem; font-family: 'Jost', sans-serif; font-size: .9rem; color: #1a1714; outline: none; transition: border-color .2s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: #b8975a; }
    textarea { resize: none; height: 80px; }
    .radio-row { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: .2rem; }
    .radio-row label { display: flex; align-items: center; gap: .4rem; font-size: .82rem; letter-spacing: 0; text-transform: none; color: #1a1714; padding: .45rem .9rem; border: 1px solid #e0d9cf; cursor: pointer; transition: border-color .2s; }
    .radio-row input[type="radio"] { width: auto; accent-color: #b8975a; }
    .radio-row label:hover { border-color: #b8975a; }
    button { margin-top: 2rem; width: 100%; background: #b8975a; border: none; color: #fff; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; padding: .9rem; cursor: pointer; letter-spacing: .05em; transition: opacity .2s; }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reserve Your Stay</h1>
    <p class="sub">Complete the form below and we'll confirm your reservation within 24 hours.</p>
    <form id="reservation-form">
      <div class="grid">
        <div class="field">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" placeholder="Jane Smith" required/>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required/>
        </div>
        <div class="field">
          <label for="check_in_date">Check-in Date</label>
          <input type="date" id="check_in_date" name="check_in_date" required/>
        </div>
        <div class="field">
          <label for="check_out_date">Check-out Date</label>
          <input type="date" id="check_out_date" name="check_out_date" required/>
        </div>
        <div class="field">
          <label for="num_guests">Number of Guests</label>
          <input type="number" id="num_guests" name="num_guests" min="1" max="10" placeholder="2" required/>
        </div>
        <div class="field">
          <label for="room_type">Room Type</label>
          <select id="room_type" name="room_type" required>
            <option value="" disabled selected>Select room</option>
            <option value="standard_single">Standard Single</option>
            <option value="deluxe_double">Deluxe Double</option>
            <option value="junior_suite">Junior Suite</option>
            <option value="presidential_suite">Presidential Suite</option>
          </select>
        </div>
        <div class="field full">
          <label>Bed Preference</label>
          <div class="radio-row">
            <label><input type="radio" name="bed_preference" value="king"/> King</label>
            <label><input type="radio" name="bed_preference" value="twin"/> Twin</label>
            <label><input type="radio" name="bed_preference" value="queen"/> Queen</label>
          </div>
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000"/>
        </div>
        <div class="field">
          <label for="promo_code">Promo Code (optional)</label>
          <input type="text" id="promo_code" name="promo_code" placeholder="SUMMER25"/>
        </div>
        <div class="field full">
          <label for="special_requests">Special Requests (optional)</label>
          <textarea id="special_requests" name="special_requests" placeholder="Early check-in, dietary needs, accessibility requirements..."></textarea>
        </div>
      </div>
      <button type="submit">Confirm Reservation</button>
    </form>
  </div>
</body>
</html>
